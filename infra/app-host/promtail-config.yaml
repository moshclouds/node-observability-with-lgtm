server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${MONITORING_VM_PRIVATE_IP}:3100/loki/api/v1/push
    tenant_id: ${ENV_NAME} # Automatically sets the X-Scope-OrgID header to 'staging' or 'production'

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: 'app'
      - target_label: env
        replacement: ${ENV_NAME}