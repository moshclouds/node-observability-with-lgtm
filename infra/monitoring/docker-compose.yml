version: '3.8'

services:
  loki:
    image: grafana/loki:latest
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      # Persistent volume for logs storage
      - loki-data:/loki
    ports:
      # Bind Loki ONLY to the Private VPC IP
      - "${MONITORING_VM_PRIVATE_IP}:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo-local.yaml
      # Persistent volume for traces storage
      - tempo-data:/var/tempo
    ports:
      # Bind Tempo ONLY to the Private VPC IP
      - "${MONITORING_VM_PRIVATE_IP}:3200:3200" # Tempo UI/API
      - "${MONITORING_VM_PRIVATE_IP}:4317:4317" # OTLP gRPC receiver
      - "${MONITORING_VM_PRIVATE_IP}:4318:4318" # OTLP HTTP receiver
    command: -config.file=/etc/tempo/tempo-local.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      # Expose Grafana publicly
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change this to a secure password on your VM!
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      # Bind Prometheus ONLY to the Private VPC IP
      - "${MONITORING_VM_PRIVATE_IP}:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

volumes:
  loki-data:
  tempo-data:
  grafana-data:
  prometheus-data:

