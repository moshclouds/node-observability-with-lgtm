global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/node-exporter-targets.json'
        refresh_interval: 30s

  - job_name: 'nestjs-services'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/nestjs-targets.json'
        refresh_interval: 30s
