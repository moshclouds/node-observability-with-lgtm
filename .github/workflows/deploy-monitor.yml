name: Deploy Monitoring Stack

on:
  push:
    branches:
      - main
    paths:
      - 'infra/monitoring/**'
      - '.github/workflows/deploy-monitor.yml'

jobs:
  deploy:
    name: Deploy to Central Monitor VM
    runs-on: ubuntu-latest
    environment: monitoring
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |

            if [ ! -d "/app/.git" ]; then
              rm -rf /app
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /app
            else
              cd /app
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi
            cd /app/infra/monitoring
            git fetch origin
            git checkout main
            git pull origin main
            echo "MONITORING_VM_PRIVATE_IP=${{ secrets.MONITORING_VM_PRIVATE_IP }}" > .env

            # Generate Prometheus target files directly on the VM (secrets interpolated by GitHub Actions before sending)
            mkdir -p targets

            cat > targets/node-exporter-targets.json << 'TARGETS_EOF'
            [
              { "targets": ["${{ secrets.STAGING_PRIVATE_IP }}:9100"], "labels": { "env": "staging" } },
              { "targets": ["${{ secrets.PROD_PRIVATE_IP }}:9100"],    "labels": { "env": "production" } }
            ]
            TARGETS_EOF

            cat > targets/nestjs-targets.json << 'TARGETS_EOF'
            [
              {
                "targets": [
                  "${{ secrets.STAGING_PRIVATE_IP }}:3001",
                  "${{ secrets.STAGING_PRIVATE_IP }}:3002",
                  "${{ secrets.STAGING_PRIVATE_IP }}:3003"
                ],
                "labels": { "env": "staging" }
              },
              {
                "targets": [
                  "${{ secrets.PROD_PRIVATE_IP }}:3001",
                  "${{ secrets.PROD_PRIVATE_IP }}:3002",
                  "${{ secrets.PROD_PRIVATE_IP }}:3003"
                ],
                "labels": { "env": "production" }
              }
            ]
            TARGETS_EOF

            docker compose pull
            docker compose up -d